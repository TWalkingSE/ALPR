name: CI

# Executa testes, lint e type check a cada push/PR.
# Testes `integration` são explicitamente excluídos.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Permite trigger manual

jobs:
  # ===========================================================================
  # Testes unitários
  # ===========================================================================
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (OpenCV)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest (unit tests)
        run: |
          python -m pytest tests/ -v --tb=short -m "not integration"

      - name: Run pytest with coverage
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest tests/ --cov=src --cov-report=xml --cov-report=term -m "not integration"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ===========================================================================
  # Lint (ruff)
  # ===========================================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/
        continue-on-error: true  # Formatação é soft-fail inicialmente

  # ===========================================================================
  # Type check (mypy)
  # ===========================================================================
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install mypy + stubs
        run: |
          pip install mypy types-PyYAML
          pip install -e .

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # Mypy é informativo inicialmente
